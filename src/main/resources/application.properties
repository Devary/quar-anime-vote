quarkus.http.port=5556
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
quarkus.vault.devservices.enabled=false
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{2.}:%L] (%t) %s%e%n
quarkus.micrometer.export.json.enabled=true
quarkus.micrometer.export.json.path=metrics/json
quarkus.micrometer.export.prometheus.path=metrics
quarkus.vault.authentication.client-token=${VAULT_TOKEN:}
quarkus.grpc.server.use-separate-server=false

# PostgreSQL — JDBC for blocking ORM (entities), reactive for Hibernate Reactive extension pool
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=devser
quarkus.datasource.password=admin123
quarkus.datasource.jdbc.url=jdbc:postgresql://192.168.178.41:31432/animevote
quarkus.datasource.reactive.url=vertx-reactive:postgresql://192.168.178.41:31432/animevote
quarkus.datasource.reactive.max-size=5
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=anime-vote
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=86400
quarkus.http.auth.proactive=false
